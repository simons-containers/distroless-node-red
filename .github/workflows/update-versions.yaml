name: Update versions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Fetch latest versions
        uses: nick-fields/retry@v4
        with:
          max_attempts: 5
          timeout_minutes: 10
          command: |
            set -uo pipefail
            NODERED=$(git ls-remote --tags https://github.com/node-red/node-red.git \
              | awk -F/ '! /beta/ {gsub("v", ""); print $3}' \
              | sort -V | tail -1
            
            yq -i ".nodered= \"$NODERED\"" versions.yaml
            git diff versions.yaml
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update Node-RED
          commit-message: Update Node-RED
